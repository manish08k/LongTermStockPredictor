# ── Features ──────────────────────────────────────────────────────────────
features:
  momentum_windows: [21, 63, 126, 252]
  ma_windows:       [20, 50, 100, 200]
  vol_windows:      [10, 21, 63]
  rsi_window:       14
  macd_fast:        12
  macd_slow:        26
  macd_signal:      9
  bb_window:        20
  bb_std:           2.0
  atr_window:       14
  lag_periods:      [1, 5, 10, 21]
  zscore_window:    252

# ── Target ────────────────────────────────────────────────────────────────
target:
  forward_returns_days: 21     # 1-month forward return
  label_method: "binary"       # "binary" | "tertile" | "quintile"
  threshold: 0.0               # 0 = above/below median

# ── Models ────────────────────────────────────────────────────────────────
models:
  use_models:
    - xgboost
    - lightgbm
    - random_forest
    - extra_trees

  cv_splits:             5
  feature_importance_top_n: 50
  saved_models:          "models/saved_models"

  walk_forward:
    train_window:      504    # ~2 years trading days
    test_window:       63     # ~3 months
    gap:               21     # 1 month gap (purging)
    expanding_window:  true

  ensemble:
    method: "weighted_avg"    # "avg" | "weighted_avg" | "stacking"
    weights:
      xgboost:      0.30
      lightgbm:     0.30
      random_forest: 0.20
      extra_trees:  0.20

  xgboost:
    n_estimators:      600
    max_depth:         5
    learning_rate:     0.03
    subsample:         0.75
    colsample_bytree:  0.75
    min_child_weight:  10
    gamma:             0.2
    reg_alpha:         0.1
    reg_lambda:        2.0
    eval_metric:       "auc"
    tree_method:       "hist"

  lightgbm:
    n_estimators:      600
    max_depth:         5
    learning_rate:     0.03
    num_leaves:        31
    subsample:         0.75
    colsample_bytree:  0.75
    min_child_samples: 30
    reg_alpha:         0.1
    reg_lambda:        2.0

  catboost:
    n_estimators:      600
    max_depth:         5
    learning_rate:     0.03
    reg_lambda:        3.0

  random_forest:
    n_estimators:      400
    max_depth:         7
    min_samples_leaf:  30
    max_features:      0.4
    n_jobs:            -1

  extra_trees:
    n_estimators:      400
    max_depth:         8
    min_samples_leaf:  25
    max_features:      0.5

# ── Deep Learning ─────────────────────────────────────────────────────────
deep_learning:
  enabled: false              # Set true to enable LSTM/GRU/Transformer
  sequence_length:    60      # Input window in days
  hidden_size:        128
  num_layers:         2
  dropout:            0.2
  batch_size:         64
  epochs:             50
  learning_rate:      0.001
  early_stopping_patience: 10
  checkpoint_dir:     "models/dl_checkpoints"
  use_gpu:            true

# ── Portfolio ─────────────────────────────────────────────────────────────
portfolio:
  method: "hrp"               # max_sharpe | min_volatility | risk_parity | hrp | equal_weight
  top_n_stocks:       20      # Number of stocks to hold
  min_score_pct:      0.60    # Minimum ensemble score percentile
  max_weight:         0.12    # Max single stock weight
  min_weight:         0.03    # Min single stock weight
  risk_free_rate:     0.065   # ~6.5% (Indian 10Y Gsec)
  regularization:     0.0001
  sector_max_exposure: 0.35
  turnover_limit:     0.80    # Max 80% turnover per rebalance
  lookback_days:      252

# ── Backtesting ───────────────────────────────────────────────────────────
backtesting:
  initial_capital:    1_000_000   # ₹10 Lakh
  rebalance_freq:     "monthly"   # daily | weekly | monthly | quarterly
  transaction_cost:   0.001       # 0.1% per trade (brokerage + STT)
  slippage:           0.0005      # 0.05% slippage
  benchmark:          "^NSEI"
  start_date:         "2018-01-01"
  end_date:           "2024-12-31"
  save_charts:        true
  charts_dir:         "outputs/charts"

# ── Outputs ───────────────────────────────────────────────────────────────
outputs:
  dir:                "outputs"
  top_stocks_csv:     "outputs/top_stocks.csv"
  portfolio_csv:      "outputs/portfolio.csv"
  backtest_csv:       "outputs/backtest_results.csv"
  model_metrics_csv:  "outputs/model_metrics.csv"
  feature_imp_csv:    "outputs/feature_importance.csv"
  trades_csv:         "outputs/trades.csv"